<html>
    <head>
        <title>Spantag html</title>
    </head>
    <body>
        <div class="container">
            <h1>This is spantag:</h1>
            <h2>Welcome to <span style="color: rgb(14, 14, 231);">india</span></h2>
            <p>India is fourth largest <span style="color: crimson;">Economy</span>in the world</p>

        </div>
    </body>
</html>

<h1>SPAN TAG</h1>
<h1>Definition</h1>
<p>span tag is an inline element used to style or target a small part of text.</p>
