<html>
<head>
    <title>Student Marks Table</title>
</head>

<body>

<h2 align="center">Student Marks Report </h2>

<table border="2" align="center">

    <thead>
        <tr>
            <th>Sno</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Mark 1</th>
            <th>Mark 2</th>
            <th>Mark 3</th>
        </tr>
    </thead>

    <tbody>

        <!-- Row 1 -->
        <tr>
            <td>1</td>
            <td>Saravanan</td>
            <td rowspan="2">Durai</td>
            <td>100</td>
            <td rowspan="2">100</td>
            <td>75</td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>2</td>
            <td>Mohamed</td>
            <!-- Last Name skipped because rowspan -->
            <td>85</td>
            <!-- Mark2 skipped because rowspan -->
            <td>75</td>
        </tr>

        <!-- Row 3 -->
        <tr>
            <td>3</td>
            <td>Kamales</td>
            <td>Sivakumar</td>
            <td>95</td>
            <td>10</td>
            <td>85</td>
        </tr>

    </tbody>

</table>

</body>
</html>
